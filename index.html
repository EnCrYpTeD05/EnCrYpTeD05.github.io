<!DOCTYPE html>
<html>
<head>
  <title>EnCrYpTeD05 | Cybersecurity</title>

  <meta name="google-site-verification" content="aWfRBs0SRggeC2_Hu8JI_CY8uG8PlRclEWrxEyxyKYo" />
  <meta name="description" content="Cybersecurity researcher building modern security tools">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      overflow-x: hidden;
    }

    /* ANIMATED BACKGROUND GLOW */
    body::before {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,0,150,0.2), transparent);
      top: -100px;
      left: -100px;
      filter: blur(100px);
      animation: move 10s infinite alternate;
    }

    @keyframes move {
      to {
        transform: translate(300px, 200px);
      }
    }

    .navbar {
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #ff4ecd;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
      animation: fadeIn 1.5s ease;
    }

    .hero h1 {
      font-size: 50px;
      background: linear-gradient(90deg, #ff4ecd, #38bdf8);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      margin-top: 15px;
      color: #aaa;
      font-size: 18px;
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(90deg, #ff4ecd, #38bdf8);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 25px;
      width: 280px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px rgba(255,78,205,0.3);
    }

    .footer {
      text-align: center;
      padding: 30px;
      color: #777;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">EnCrYpTeD05</div>
  </div>

  <div class="hero">
    <h1>Cybersecurity Developer</h1>
    <p>Building modern security tools for bug bounty & pentesting</p>

    <a class="btn" href="https://github.com/EnCrYpTeD05">GitHub Profile</a>
  </div>

  <div class="section">
    <h2>My Tools</h2>

    <div class="grid">

      <div class="card">
        <h3>XSS-HUNTER</h3>
        <p>Advanced XSS detection tool</p>
        <a class="btn" href="https://github.com/EnCrYpTeD05/XSS-HUNTER">Open</a>
      </div>

    </div>
  </div>

  <div class="footer">
    © 2026 EnCrYpTeD05
  </div>

</body>
</html>
